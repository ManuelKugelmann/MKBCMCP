#!/bin/bash
set -euo pipefail

# mkbc-mcp Uberspace setup script
# Run on Uberspace after cloning the repo

echo "🔧 Setting up mkbc-mcp on Uberspace..."

# Node 20
echo "📦 Setting Node.js version..."
uberspace tools version use node 20

# Data dirs
echo "📁 Creating data directories..."
mkdir -p ~/mcp-data/{oauth,clones,store}
mkdir -p ~/logs

# Install dependencies
echo "📦 Installing dependencies..."
cd ~/mkbc-mcp
npm install

# Build
echo "🔨 Building..."
npm run build

# Check .env
if [ ! -f .env ]; then
    echo "⚠️  No .env file found. Copy from .env.example and fill in values:"
    echo "    cp .env.example .env"
    echo "    nano .env"
    exit 1
fi

# Web backend
echo "🌐 Configuring web backend..."
PORT=$(grep PORT .env | cut -d= -f2)
uberspace web backend set / --http --port "${PORT:-62100}"

# Supervisord
echo "⚙️  Installing supervisord service..."
cp deploy/supervisord.ini ~/etc/services.d/mkbc-mcp.ini
supervisorctl reread
supervisorctl update

echo ""
echo "✅ Setup complete!"
echo ""
echo "Next steps:"
echo "  1. Check status:  supervisorctl status mkbc-mcp"
echo "  2. View logs:     tail -f ~/logs/mkbc-mcp.out.log"
echo "  3. Test endpoint: curl -I https://$(hostname)/mcp"
echo "  4. Add to claude.ai: Settings → Connectors → Add custom connector"
echo "     URL: https://$(hostname)/mcp"
